{% extends "base.html" %}

{% block title %}Add Suspect | Punjab Police RMS{% endblock %}

{% block content %}
<h2>Add New Suspect</h2>

{% if message %}
    <div class="success">{{ message }}</div>
{% endif %}

<form method="POST" action="/add-suspect">
    <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Enter full name" required>
    </div>
    <div class="form-group">
        <label>CNIC</label>
        <input type="text" name="cnic" placeholder="35202-1234567-1" required>
    </div>
    <div class="form-group">
        <label>Crime</label>
        <input type="text" name="crime" placeholder="Crime committed" required>
    </div>
    <div class="form-group">
        <label>Status</label>
        <select name="status">
            <option value="Wanted">Wanted</option>
            <option value="Arrested">Arrested</option>
            <option value="Released">Released</option>
        </select>
    </div>
    <button type="submit" class="btn">Add Suspect</button>
</form>

<a class="back" href="/">← Back to Home</a>
{% endblock %}
