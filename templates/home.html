{% extends "base.html" %}

{% block title %}Home | Punjab Police RMS{% endblock %}

{% block content %}
<h2>Search Suspect by CNIC</h2>
<p>Enter the CNIC number of the suspect to retrieve their criminal record.</p>

<form action="/search" method="get">
    <div class="search-box">
        <input type="text" name="cnic" placeholder="e.g. 35202-1234567-1" />
        <button type="submit">Search</button>
    </div>
</form>

<div class="notice">
    ⚠️ Unauthorized access to this system is a criminal offense under PECA 2016.
</div>
{% endblock %}
